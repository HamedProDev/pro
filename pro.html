<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Name Animation Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --secondary: #8b5cf6;
            --accent: #ec4899;
            --dark: #1e1b4b;
            --light: #f8fafc;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body {
            background: linear-gradient(135deg, var(--dark) 0%, #0f172a 100%);
            color: var(--light);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 30px 0;
            position: relative;
        }

        .header h1 {
            font-size: 3.5rem;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
            text-shadow: 0 5px 15px rgba(99, 102, 241, 0.3);
        }

        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto 30px;
        }

        /* Input Section */
        .input-section {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin: 30px 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .input-group {
            display: flex;
            gap: 15px;
            max-width: 600px;
            margin: 0 auto;
        }

        .name-input {
            flex: 1;
            padding: 18px 25px;
            border: none;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--light);
            font-size: 1.2rem;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .name-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3);
            background: rgba(255, 255, 255, 0.15);
        }

        .name-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .animate-btn {
            padding: 18px 35px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .animate-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
        }

        .animate-btn:active {
            transform: translateY(-1px);
        }

        /* Animation Selector */
        .animation-selector {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }

        .animation-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .animation-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
        }

        .animation-card.active {
            border-color: var(--accent);
            background: rgba(236, 72, 153, 0.1);
        }

        .animation-card .icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
            color: var(--primary);
        }

        .animation-card h3 {
            font-size: 1.4rem;
            margin-bottom: 10px;
        }

        .animation-card p {
            font-size: 0.95rem;
            opacity: 0.8;
            line-height: 1.5;
        }

        /* Display Area */
        .display-area {
            min-height: 400px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            margin: 40px 0;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        #animationCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .animated-name {
            font-size: 5rem;
            font-weight: 900;
            text-transform: uppercase;
            position: relative;
            z-index: 2;
            text-align: center;
        }

        /* Controls */
        .controls {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            margin: 30px 0;
        }

        .control-group {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
            justify-content: center;
        }

        .control-btn {
            padding: 12px 25px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .slider-group {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px 20px;
            border-radius: 10px;
        }

        .slider-group label {
            min-width: 100px;
        }

        input[type="range"] {
            width: 200px;
            height: 6px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: var(--primary);
            border-radius: 50%;
            cursor: pointer;
        }

        .color-picker {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .color-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 2px solid white;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .color-btn:hover {
            transform: scale(1.2);
        }

        /* Preview Cards */
        .preview-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }

        .preview-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .preview-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-5px);
        }

        .preview-card .preview-text {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 10px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .preview-card p {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 30px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 50px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.5rem;
            }
            
            .input-group {
                flex-direction: column;
            }
            
            .animation-selector {
                grid-template-columns: 1fr;
            }
            
            .animated-name {
                font-size: 3rem;
            }
            
            .control-group {
                flex-direction: column;
                align-items: stretch;
            }
            
            .slider-group {
                flex-direction: column;
                align-items: flex-start;
            }
            
            input[type="range"] {
                width: 100%;
            }
        }

        /* Custom animations for preview */
        @keyframes neon-glow {
            0%, 100% { text-shadow: 0 0 10px var(--clr), 0 0 20px var(--clr), 0 0 30px var(--clr); }
            50% { text-shadow: 0 0 5px var(--clr), 0 0 10px var(--clr), 0 0 15px var(--clr); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes wave {
            0% { transform: translateY(0px); }
            25% { transform: translateY(-15px); }
            75% { transform: translateY(15px); }
            100% { transform: translateY(0px); }
        }

        @keyframes rotate3d {
            0% { transform: rotateX(0) rotateY(0) rotateZ(0); }
            100% { transform: rotateX(360deg) rotateY(360deg) rotateZ(360deg); }
        }

        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1><i class="fas fa-magic"></i> Name Animation Generator</h1>
            <p>Enter any name and watch it come to life with stunning animations! Choose from multiple effects and customize everything.</p>
        </header>

        <!-- Input Section -->
        <section class="input-section">
            <div class="input-group">
                <input type="text" id="nameInput" class="name-input" placeholder="Enter your name here..." maxlength="20">
                <button id="animateBtn" class="animate-btn">
                    <i class="fas fa-play"></i> Animate Now!
                </button>
            </div>
            
            <div class="preview-cards" id="previewCards">
                <!-- Preview cards will be generated by JavaScript -->
            </div>
        </section>

        <!-- Animation Selector -->
        <section class="animation-selector" id="animationSelector">
            <!-- Animation cards will be generated by JavaScript -->
        </section>

        <!-- Display Area -->
        <section class="display-area">
            <canvas id="animationCanvas"></canvas>
            <div class="animated-name" id="animatedName">HAMED</div>
        </section>

        <!-- Controls -->
        <section class="controls">
            <div class="control-group">
                <button class="control-btn" id="playBtn">
                    <i class="fas fa-play"></i> Play
                </button>
                <button class="control-btn" id="pauseBtn">
                    <i class="fas fa-pause"></i> Pause
                </button>
                <button class="control-btn" id="resetBtn">
                    <i class="fas fa-redo"></i> Reset
                </button>
                <button class="control-btn" id="randomBtn">
                    <i class="fas fa-random"></i> Random Effect
                </button>
                
                <div class="slider-group">
                    <label for="speedSlider">Speed:</label>
                    <input type="range" id="speedSlider" min="0.1" max="3" step="0.1" value="1">
                    <span id="speedValue">1.0x</span>
                </div>
                
                <div class="slider-group">
                    <label for="sizeSlider">Size:</label>
                    <input type="range" id="sizeSlider" min="20" max="120" step="1" value="80">
                    <span id="sizeValue">80px</span>
                </div>
                
                <div class="color-picker">
                    <div class="color-btn" style="background: #6366f1;" onclick="setColor('#6366f1')"></div>
                    <div class="color-btn" style="background: #ec4899;" onclick="setColor('#ec4899')"></div>
                    <div class="color-btn" style="background: #10b981;" onclick="setColor('#10b981')"></div>
                    <div class="color-btn" style="background: #f59e0b;" onclick="setColor('#f59e0b')"></div>
                    <div class="color-btn" style="background: #8b5cf6;" onclick="setColor('#8b5cf6')"></div>
                    <input type="color" id="customColor" value="#6366f1" onchange="setColor(this.value)">
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <p>Created with <i class="fas fa-heart" style="color: #ec4899;"></i> | Name Animation Generator © 2024</p>
            <p style="margin-top: 10px; opacity: 0.7;">Try different names and animations! Share your creations.</p>
        </footer>
    </div>

    <script>
        // DOM Elements
        const nameInput = document.getElementById('nameInput');
        const animateBtn = document.getElementById('animateBtn');
        const animatedName = document.getElementById('animatedName');
        const animationCanvas = document.getElementById('animationCanvas');
        const ctx = animationCanvas.getContext('2d');
        const previewCards = document.getElementById('previewCards');
        const animationSelector = document.getElementById('animationSelector');
        
        // Control buttons
        const playBtn = document.getElementById('playBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const randomBtn = document.getElementById('randomBtn');
        const speedSlider = document.getElementById('speedSlider');
        const speedValue = document.getElementById('speedValue');
        const sizeSlider = document.getElementById('sizeSlider');
        const sizeValue = document.getElementById('sizeValue');
        
        // Animation state
        let currentAnimation = 'fire';
        let isAnimating = true;
        let animationSpeed = 1;
        let fontSize = 80;
        let currentColor = '#6366f1';
        let particles = [];
        let time = 0;
        let animationFrameId;
        
        // Sample names for preview
        const sampleNames = ['HAMED', 'ALI', 'SARA', 'OMAR', 'LINA', 'ZAYN'];
        
        // Animation types with descriptions and icons
        const animations = [
            {
                id: 'fire',
                name: 'Fire Effect',
                icon: 'fas fa-fire',
                description: 'Letters appear to burn with realistic fire animation',
                colors: ['#ff6b00', '#ff9500', '#ffaa00']
            },
            {
                id: 'neon',
                name: 'Neon Glow',
                icon: 'fas fa-lightbulb',
                description: 'Bright neon glow with electric pulses',
                colors: ['#00ffaa', '#00aaff', '#aa00ff']
            },
            {
                id: 'particles',
                name: 'Particle Explosion',
                icon: 'fas fa-atom',
                description: 'Letters explode into thousands of particles',
                colors: ['#6366f1', '#8b5cf6', '#ec4899']
            },
            {
                id: 'wave',
                name: 'Ocean Wave',
                icon: 'fas fa-water',
                description: 'Gentle wave motion like ocean waves',
                colors: ['#00aaff', '#0088cc', '#006699']
            },
            {
                id: 'matrix',
                name: 'Matrix Rain',
                icon: 'fas fa-code',
                description: 'Digital rain effect with falling characters',
                colors: ['#00ff00', '#00cc00', '#009900']
            },
            {
                id: 'galaxy',
                name: 'Galaxy Swirl',
                icon: 'fas fa-star',
                description: 'Cosmic spiral with stars and nebula',
                colors: ['#8b5cf6', '#ec4899', '#6366f1']
            },
            {
                id: 'lightning',
                name: 'Lightning Strike',
                icon: 'fas fa-bolt',
                description: 'Electric lightning strikes each letter',
                colors: ['#ffff00', '#ffaa00', '#ff5500']
            },
            {
                id: 'bounce',
                name: 'Bouncing Letters',
                icon: 'fas fa-basketball-ball',
                description: 'Letters bounce with physics simulation',
                colors: ['#10b981', '#0ea5e9', '#8b5cf6']
            },
            {
                id: 'rainbow',
                name: 'Rainbow Flow',
                icon: 'fas fa-rainbow',
                description: 'Smooth rainbow color transitions',
                colors: ['#ff0000', '#ff9500', '#ffff00', '#00ff00', '#00aaff', '#8b5cf6', '#ff00ff']
            },
            {
                id: 'glitch',
                name: 'Digital Glitch',
                icon: 'fas fa-desktop',
                description: 'Digital distortion and glitch effects',
                colors: ['#00ffaa', '#ff00aa', '#aa00ff']
            },
            {
                id: 'ice',
                name: 'Ice Crystal',
                icon: 'fas fa-snowflake',
                description: 'Frozen ice crystals and frost effects',
                colors: ['#00ffff', '#00aaff', '#0088cc']
            },
            {
                id: 'lava',
                name: 'Lava Flow',
                icon: 'fas fa-volcano',
                description: 'Molten lava flowing through letters',
                colors: ['#ff3300', '#ff6600', '#ff9900']
            }
        ];
        
        // Initialize
        function init() {
            // Set canvas size
            updateCanvasSize();
            
            // Generate preview cards
            generatePreviewCards();
            
            // Generate animation selector
            generateAnimationSelector();
            
            // Set up event listeners
            setupEventListeners();
            
            // Start animation
            animate();
            
            // Set initial name
            updateName('HAMED');
        }
        
        // Update canvas size
        function updateCanvasSize() {
            const displayArea = document.querySelector('.display-area');
            animationCanvas.width = displayArea.clientWidth;
            animationCanvas.height = displayArea.clientHeight;
        }
        
        // Generate preview cards
        function generatePreviewCards() {
            previewCards.innerHTML = '';
            sampleNames.forEach(name => {
                const card = document.createElement('div');
                card.className = 'preview-card';
                card.innerHTML = `
                    <div class="preview-text" style="color: ${getRandomColor()}">${name}</div>
                    <p>Click to animate "${name}"</p>
                `;
                card.addEventListener('click', () => {
                    nameInput.value = name;
                    updateName(name);
                });
                previewCards.appendChild(card);
            });
        }
        
        // Generate animation selector
        function generateAnimationSelector() {
            animationSelector.innerHTML = '';
            animations.forEach(anim => {
                const card = document.createElement('div');
                card.className = `animation-card ${anim.id === currentAnimation ? 'active' : ''}`;
                card.innerHTML = `
                    <div class="icon"><i class="${anim.icon}"></i></div>
                    <h3>${anim.name}</h3>
                    <p>${anim.description}</p>
                `;
                card.addEventListener('click', () => {
                    setAnimation(anim.id);
                    // Remove active class from all cards
                    document.querySelectorAll('.animation-card').forEach(c => {
                        c.classList.remove('active');
                    });
                    // Add active class to clicked card
                    card.classList.add('active');
                });
                animationSelector.appendChild(card);
            });
        }
        
        // Set up event listeners
        function setupEventListeners() {
            // Animate button
            animateBtn.addEventListener('click', () => {
                const name = nameInput.value.trim() || 'HAMED';
                updateName(name);
            });
            
            // Enter key in input
            nameInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const name = nameInput.value.trim() || 'HAMED';
                    updateName(name);
                }
            });
            
            // Control buttons
            playBtn.addEventListener('click', () => {
                isAnimating = true;
                if (!animationFrameId) {
                    animate();
                }
            });
            
            pauseBtn.addEventListener('click', () => {
                isAnimating = false;
                if (animationFrameId) {
                    cancelAnimationFrame(animationFrameId);
                    animationFrameId = null;
                }
            });
            
            resetBtn.addEventListener('click', () => {
                time = 0;
                particles = [];
                resetAnimation();
            });
            
            randomBtn.addEventListener('click', () => {
                const randomAnim = animations[Math.floor(Math.random() * animations.length)];
                setAnimation(randomAnim.id);
                
                // Update active card
                document.querySelectorAll('.animation-card').forEach(c => {
                    c.classList.remove('active');
                });
                document.querySelectorAll('.animation-card')[animations.findIndex(a => a.id === randomAnim.id)].classList.add('active');
            });
            
            // Sliders
            speedSlider.addEventListener('input', (e) => {
                animationSpeed = parseFloat(e.target.value);
                speedValue.textContent = `${animationSpeed.toFixed(1)}x`;
            });
            
            sizeSlider.addEventListener('input', (e) => {
                fontSize = parseInt(e.target.value);
                sizeValue.textContent = `${fontSize}px`;
                animatedName.style.fontSize = `${fontSize}px`;
            });
            
            // Window resize
            window.addEventListener('resize', () => {
                updateCanvasSize();
                resetAnimation();
            });
        }
        
        // Update the displayed name
        function updateName(name) {
            animatedName.textContent = name.toUpperCase();
            resetAnimation();
            
            // Add a fun confirmation effect
            animatedName.style.transform = 'scale(1.1)';
            setTimeout(() => {
                animatedName.style.transform = 'scale(1)';
            }, 200);
        }
        
        // Set animation type
        function setAnimation(animationId) {
            currentAnimation = animationId;
            resetAnimation();
            
            // Update color based on animation
            const anim = animations.find(a => a.id === animationId);
            if (anim && anim.colors) {
                setColor(anim.colors[0]);
            }
        }
        
        // Set color
        function setColor(color) {
            currentColor = color;
            document.getElementById('customColor').value = color;
        }
        
        // Reset animation
        function resetAnimation() {
            time = 0;
            particles = [];
            
            // Clear canvas
            ctx.clearRect(0, 0, animationCanvas.width, animationCanvas.height);
        }
        
        // Main animation loop
        function animate() {
            if (!isAnimating) return;
            
            time += 0.016 * animationSpeed; // Approximately 60 FPS
            
            // Clear canvas with fade effect for some animations
            if (['particles', 'galaxy', 'matrix'].includes(currentAnimation)) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
                ctx.fillRect(0, 0, animationCanvas.width, animationCanvas.height);
            } else {
                ctx.clearRect(0, 0, animationCanvas.width, animationCanvas.height);
            }
            
            // Run selected animation
            switch(currentAnimation) {
                case 'fire': animateFire(); break;
                case 'neon': animateNeon(); break;
                case 'particles': animateParticles(); break;
                case 'wave': animateWave(); break;
                case 'matrix': animateMatrix(); break;
                case 'galaxy': animateGalaxy(); break;
                case 'lightning': animateLightning(); break;
                case 'bounce': animateBounce(); break;
                case 'rainbow': animateRainbow(); break;
                case 'glitch': animateGlitch(); break;
                case 'ice': animateIce(); break;
                case 'lava': animateLava(); break;
            }
            
            animationFrameId = requestAnimationFrame(animate);
        }
        
        // Animation: Fire Effect
        function animateFire() {
            const name = animatedName.textContent;
            const letters = name.split('');
            
            letters.forEach((letter, index) => {
                const x = (animationCanvas.width / 2) - (name.length * fontSize * 0.3) + (index * fontSize * 0.6);
                const y = animationCanvas.height / 2;
                
                // Draw fire particles
                for (let i = 0; i < 5; i++) {
                    const particle = {
                        x: x + Math.random() * fontSize * 0.5 - fontSize * 0.25,
                        y: y + fontSize * 0.6,
                        size: Math.random() * 5 + 2,
                        speed: Math.random() * 2 + 1,
                        life: Math.random() * 1 + 0.5,
                        color: `rgba(255, ${Math.floor(100 + Math.random() * 155)}, 0, ${Math.random() * 0.8 + 0.2})`
                    };
                    
                    particles.push(particle);
                }
            });
            
            // Update and draw particles
            particles = particles.filter(p => {
                p.y -= p.speed;
                p.life -= 0.02;
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
                
                return p.life > 0 && p.y > 0;
            });
            
            // Draw text with fire effect
            ctx.font = `900 ${fontSize}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            const gradient = ctx.createLinearGradient(
                0, animationCanvas.height / 2 - fontSize / 2,
                0, animationCanvas.height / 2 + fontSize / 2
            );
            gradient.addColorStop(0, '#ff6b00');
            gradient.addColorStop(0.5, '#ff9500');
            gradient.addColorStop(1, '#ffaa00');
            
            ctx.fillStyle = gradient;
            ctx.fillText(name, animationCanvas.width / 2, animationCanvas.height / 2);
        }
        
        // Animation: Neon Glow
        function animateNeon() {
            const name = animatedName.textContent;
            
            ctx.font = `900 ${fontSize}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Multiple glow layers
            for (let i = 5; i > 0; i--) {
                ctx.shadowBlur = i * 10;
                ctx.shadowColor = currentColor;
                ctx.fillStyle = i === 1 ? 'white' : currentColor;
                ctx.globalAlpha = i === 1 ? 1 : 0.3 / i;
                ctx.fillText(name, animationCanvas.width / 2, animationCanvas.height / 2);
            }
            
            // Reset shadow
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1;
            
            // Add pulsing effect
            const pulse = Math.sin(time * 3) * 0.2 + 0.8;
            animatedName.style.textShadow = `0 0 ${20 * pulse}px ${currentColor}, 0 0 ${40 * pulse}px ${currentColor}`;
            animatedName.style.color = 'white';
        }
        
        // Animation: Particle Explosion
        function animateParticles() {
            const name = animatedName.textContent;
            const centerX = animationCanvas.width / 2;
            const centerY = animationCanvas.height / 2;
            
            // Create new particles
            if (particles.length < 1000 && Math.random() < 0.5) {
                for (let i = 0; i < 5; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 3 + 1;
                    
                    particles.push({
                        x: centerX + Math.cos(angle) * 100,
                        y: centerY + Math.sin(angle) * 100,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        size: Math.random() * 3 + 1,
                        life: 1,
                        color: currentColor
                    });
                }
            }
            
            // Update and draw particles
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.01;
                p.vx *= 0.99;
                p.vy *= 0.99;
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.fill();
                
                return p.life > 0 && 
                       p.x > -50 && p.x < animationCanvas.width + 50 && 
                       p.y > -50 && p.y < animationCanvas.height + 50;
            });
            
            ctx.globalAlpha = 1;
            
            // Draw text outline
            ctx.font = `900 ${fontSize}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.strokeStyle = currentColor;
            ctx.lineWidth = 3;
            ctx.strokeText(name, centerX, centerY);
        }
        
        // Animation: Ocean Wave
        function animateWave() {
            const name = animatedName.textContent;
            const letters = name.split('');
            
            ctx.font = `900 ${fontSize}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            letters.forEach((letter, index) => {
                const waveOffset = Math.sin(time * 2 + index * 0.5) * 20;
                const x = (animationCanvas.width / 2) - (name.length * fontSize * 0.3) + (index * fontSize * 0.6);
                const y = (animationCanvas.height / 2) + waveOffset;
                
                // Create gradient for wave effect
                const gradient = ctx.createLinearGradient(x - fontSize/2, y - fontSize/2, x + fontSize/2, y + fontSize/2);
                gradient.addColorStop(0, '#00aaff');
                gradient.addColorStop(0.5, '#00ffff');
                gradient.addColorStop(1, '#00aaff');
                
                ctx.fillStyle = gradient;
                ctx.fillText(letter, x, y);
            });
            
            // Add water particles
            if (Math.random() < 0.3) {
                particles.push({
                    x: Math.random() * animationCanvas.width,
                    y: animationCanvas.height,
                    size: Math.random() * 3 + 1,
                    speed: Math.random() * 2 + 1,
                    life: 1,
                    color: '#00ffff'
                });
            }
            
            // Draw water particles
            particles = particles.filter(p => {
                p.y -= p.speed;
                p.life -= 0.01;
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.fill();
                
                return p.life > 0 && p.y > 0;
            });
            
            ctx.globalAlpha = 1;
        }
        
        // Animation: Matrix Rain
        function animateMatrix() {
            const name = animatedName.textContent;
            
            // Draw matrix rain
            if (particles.length < 100) {
                particles.push({
                    x: Math.random() * animationCanvas.width,
                    y: 0,
                    speed: Math.random() * 5 + 2,
                    chars: '01',
                    length: Math.floor(Math.random() * 10) + 5,
                    color: '#00ff00'
                });
            }
            
            // Update and draw matrix columns
            particles = particles.filter(p => {
                p.y += p.speed;
                
                // Draw characters
                for (let i = 0; i < p.length; i++) {
                    const char = p.chars[Math.floor(Math.random() * p.chars.length)];
                    const y = p.y - (i * 20);
                    
                    if (y > 0 && y < animationCanvas.height) {
                        ctx.font = '20px monospace';
                        ctx.fillStyle = p.color;
                        ctx.globalAlpha = 1 - (i / p.length);
                        ctx.fillText(char, p.x, y);
                    }
                }
                
                ctx.globalAlpha = 1;
                return p.y < animationCanvas.height + p.length * 20;
            });
            
            // Draw name in matrix style
            ctx.font = `900 ${fontSize}px monospace`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Green text with slight transparency
            ctx.fillStyle = 'rgba(0, 255, 0, 0.9)';
            ctx.fillText(name, animationCanvas.width / 2, animationCanvas.height / 2);
            
            // Add glitch effect occasionally
            if (Math.random() < 0.02) {
                ctx.fillStyle = 'black';
                ctx.fillRect(
                    animationCanvas.width / 2 - name.length * fontSize * 0.3,
                    animationCanvas.height / 2 - fontSize / 2,
                    name.length * fontSize * 0.6,
                    fontSize
                );
            }
        }
        
        // Animation: Galaxy Swirl
        function animateGalaxy() {
            const name = animatedName.textContent;
            const centerX = animationCanvas.width / 2;
            const centerY = animationCanvas.height / 2;
            
            // Create stars
            if (particles.length < 500) {
                for (let i = 0; i < 5; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const distance = Math.random() * 300;
                    const orbitSpeed = 0.01 + Math.random() * 0.02;
                    
                    particles.push({
                        angle: angle,
                        distance: distance,
                        orbitSpeed: orbitSpeed,
                        size: Math.random() * 2 + 0.5,
                        color: Math.random() > 0.5 ? '#8b5cf6' : '#ec4899'
                    });
                }
            }
            
            // Draw swirling stars
            particles.forEach(p => {
                p.angle += p.orbitSpeed;
                const x = centerX + Math.cos(p.angle) * p.distance;
                const y = centerY + Math.sin(p.angle) * p.distance;
                
                ctx.beginPath();
                ctx.arc(x, y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
            });
            
            // Draw name with nebula effect
            ctx.font = `900 ${fontSize}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Create radial gradient for nebula effect
            const gradient = ctx.createRadialGradient(
                centerX, centerY, 0,
                centerX, centerY, fontSize * 2
            );
            gradient.addColorStop(0, '#8b5cf6');
            gradient.addColorStop(0.5, '#ec4899');
            gradient.addColorStop(1, '#6366f1');
            
            ctx.fillStyle = gradient;
            ctx.fillText(name, centerX, centerY);
            
            // Add glow
            ctx.shadowBlur = 30;
            ctx.shadowColor = '#8b5cf6';
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 2;
            ctx.strokeText(name, centerX, centerY);
            ctx.shadowBlur = 0;
        }
        
        // Animation: Lightning Strike
        function animateLightning() {
            const name = animatedName.textContent;
            const letters = name.split('');
            
            ctx.font = `900 ${fontSize}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            letters.forEach((letter, index) => {
                const x = (animationCanvas.width / 2) - (name.length * fontSize * 0.3) + (index * fontSize * 0.6);
                const y = animationCanvas.height / 2;
                
                // Random lightning strikes
                if (Math.random() < 0.1) {
                    drawLightning(x, y - fontSize / 2, x, 0);
                }
                
                // Draw letter with electric effect
                const intensity = Math.sin(time * 10 + index) * 0.5 + 0.5;
                ctx.fillStyle = `rgba(255, ${Math.floor(200 + intensity * 55)}, 0, 1)`;
                ctx.fillText(letter, x, y);
            });
            
            // Function to draw lightning
            function drawLightning(x1, y1, x2, y2) {
                ctx.strokeStyle = '#ffff00';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                
                let currentX = x1;
                let currentY = y1;
                const segments = 10;
                
                for (let i = 1; i <= segments; i++) {
                    const nextY = y1 + (y2 - y1) * (i / segments);
                    const nextX = currentX + (Math.random() - 0.5) * 50;
                    
                    ctx.lineTo(nextX, nextY);
                    currentX = nextX;
                    currentY = nextY;
                }
                
                ctx.stroke();
                
                // Add glow
                ctx.strokeStyle = '#ffaa00';
                ctx.lineWidth = 1;
                ctx.globalAlpha = 0.5;
                ctx.stroke();
                ctx.globalAlpha = 1;
            }
        }
        
        // Animation: Bouncing Letters
        function animateBounce() {
            const name = animatedName.textContent;
            const letters = name.split('');
            
            ctx.font = `900 ${fontSize}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            letters.forEach((letter, index) => {
                const bounce = Math.abs(Math.sin(time * 2 + index * 0.5)) * 30;
                const x = (animationCanvas.width / 2) - (name.length * fontSize * 0.3) + (index * fontSize * 0.6);
                const y = (animationCanvas.height / 2) - bounce;
                
                // Create gradient
                const gradient = ctx.createLinearGradient(x - 20, y - 20, x + 20, y + 20);
                gradient.addColorStop(0, '#10b981');
                gradient.addColorStop(0.5, '#0ea5e9');
                gradient.addColorStop(1, '#8b5cf6');
                
                ctx.fillStyle = gradient;
                ctx.fillText(letter, x, y);
                
                // Add shadow
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.lineWidth = 2;
                ctx.strokeText(letter, x, y);
            });
        }
        
        // Animation: Rainbow Flow
        function animateRainbow() {
            const name = animatedName.textContent;
            
            ctx.font = `900 ${fontSize}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Create rainbow gradient
            const gradient = ctx.createLinearGradient(
                animationCanvas.width / 2 - name.length * fontSize * 0.3,
                animationCanvas.height / 2,
                animationCanvas.width / 2 + name.length * fontSize * 0.3,
                animationCanvas.height / 2
            );
            
            // Add rainbow colors with animation offset
            const hueOffset = (time * 50) % 360;
            gradient.addColorStop(0, `hsl(${(hueOffset) % 360}, 100%, 50%)`);
            gradient.addColorStop(0.2, `hsl(${(hueOffset + 60) % 360}, 100%, 50%)`);
            gradient.addColorStop(0.4, `hsl(${(hueOffset + 120) % 360}, 100%, 50%)`);
            gradient.addColorStop(0.6, `hsl(${(hueOffset + 180) % 360}, 100%, 50%)`);
            gradient.addColorStop(0.8, `hsl(${(hueOffset + 240) % 360}, 100%, 50%)`);
            gradient.addColorStop(1, `hsl(${(hueOffset + 300) % 360}, 100%, 50%)`);
            
            ctx.fillStyle = gradient;
            ctx.fillText(name, animationCanvas.width / 2, animationCanvas.height / 2);
            
            // Add pulsing glow
            const pulse = Math.sin(time * 3) * 0.3 + 0.7;
            animatedName.style.textShadow = `0 0 ${10 * pulse}px rgba(255,255,255,0.5)`;
        }
        
        // Animation: Digital Glitch
        function animateGlitch() {
            const name = animatedName.textContent;
            
            ctx.font = `900 ${fontSize}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Base text
            ctx.fillStyle = '#00ffaa';
            ctx.fillText(name, animationCanvas.width / 2, animationCanvas.height / 2);
            
            // Random glitch effects
            if (Math.random() < 0.3) {
                // Shift red channel
                ctx.fillStyle = '#ff00aa';
                ctx.fillText(
                    name, 
                    animationCanvas.width / 2 + (Math.random() - 0.5) * 10,
                    animationCanvas.height / 2 + (Math.random() - 0.5) * 10
                );
                
                // Shift blue channel
                ctx.fillStyle = '#aa00ff';
                ctx.fillText(
                    name, 
                    animationCanvas.width / 2 + (Math.random() - 0.5) * 10,
                    animationCanvas.height / 2 + (Math.random() - 0.5) * 10
                );
            }
            
            // Scan lines
            if (Math.random() < 0.5) {
                ctx.strokeStyle = 'rgba(0, 255, 170, 0.1)';
                ctx.lineWidth = 1;
                
                for (let i = 0; i < 5; i++) {
                    const y = Math.random() * animationCanvas.height;
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(animationCanvas.width, y);
                    ctx.stroke();
                }
            }
            
            // Random pixel blocks
            if (Math.random() < 0.1) {
                const blockSize = 10;
                const blockX = Math.random() * animationCanvas.width;
                const blockY = Math.random() * animationCanvas.height;
                
                ctx.fillStyle = 'black';
                ctx.fillRect(blockX, blockY, blockSize, blockSize);
            }
        }
        
        // Animation: Ice Crystal
        function animateIce() {
            const name = animatedName.textContent;
            
            ctx.font = `900 ${fontSize}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Ice gradient
            const gradient = ctx.createLinearGradient(
                animationCanvas.width / 2, 
                animationCanvas.height / 2 - fontSize / 2,
                animationCanvas.width / 2, 
                animationCanvas.height / 2 + fontSize / 2
            );
            gradient.addColorStop(0, '#00ffff');
            gradient.addColorStop(0.5, '#ffffff');
            gradient.addColorStop(1, '#00aaff');
            
            ctx.fillStyle = gradient;
            ctx.fillText(name, animationCanvas.width / 2, animationCanvas.height / 2);
            
            // Ice crystals
            if (Math.random() < 0.2) {
                particles.push({
                    x: Math.random() * animationCanvas.width,
                    y: 0,
                    size: Math.random() * 3 + 1,
                    speed: Math.random() * 2 + 1,
                    rotation: Math.random() * Math.PI * 2,
                    rotationSpeed: (Math.random() - 0.5) * 0.1,
                    life: 1
                });
            }
            
            // Draw and update crystals
            particles = particles.filter(p => {
                p.y += p.speed;
                p.rotation += p.rotationSpeed;
                p.life -= 0.005;
                
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation);
                ctx.fillStyle = 'rgba(0, 255, 255, 0.7)';
                ctx.globalAlpha = p.life;
                
                // Draw snowflake shape
                ctx.beginPath();
                for (let i = 0; i < 6; i++) {
                    const angle = (i * Math.PI) / 3;
                    ctx.moveTo(0, 0);
                    ctx.lineTo(Math.cos(angle) * p.size * 2, Math.sin(angle) * p.size * 2);
                }
                ctx.strokeStyle = '#00ffff';
                ctx.lineWidth = 1;
                ctx.stroke();
                
                ctx.restore();
                return p.life > 0 && p.y < animationCanvas.height;
            });
            
            ctx.globalAlpha = 1;
            
            // Add frost effect to text
            animatedName.style.textShadow = `
                0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 30px #00aaff
            `;
        }
        
        // Animation: Lava Flow
        function animateLava() {
            const name = animatedName.textContent;
            
            ctx.font = `900 ${fontSize}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Lava gradient
            const gradient = ctx.createLinearGradient(
                animationCanvas.width / 2, 
                animationCanvas.height / 2 - fontSize / 2,
                animationCanvas.width / 2, 
                animationCanvas.height / 2 + fontSize / 2
            );
            gradient.addColorStop(0, '#ff3300');
            gradient.addColorStop(0.5, '#ff6600');
            gradient.addColorStop(1, '#ff9900');
            
            ctx.fillStyle = gradient;
            ctx.fillText(name, animationCanvas.width / 2, animationCanvas.height / 2);
            
            // Lava bubbles
            if (Math.random() < 0.3) {
                const x = animationCanvas.width / 2 + (Math.random() - 0.5) * name.length * fontSize * 0.6;
                const y = animationCanvas.height / 2 + fontSize / 2;
                
                particles.push({
                    x: x,
                    y: y,
                    size: Math.random() * 5 + 2,
                    speed: Math.random() * 3 + 1,
                    life: 1
                });
            }
            
            // Draw and update lava bubbles
            particles = particles.filter(p => {
                p.y -= p.speed;
                p.x += (Math.random() - 0.5) * 2;
                p.life -= 0.02;
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                
                const bubbleGradient = ctx.createRadialGradient(
                    p.x, p.y, 0,
                    p.x, p.y, p.size * p.life
                );
                bubbleGradient.addColorStop(0, '#ff9900');
                bubbleGradient.addColorStop(1, '#ff3300');
                
                ctx.fillStyle = bubbleGradient;
                ctx.globalAlpha = p.life;
                ctx.fill();
                
                return p.life > 0 && p.y > animationCanvas.height / 2 - fontSize / 2;
            });
            
            ctx.globalAlpha = 1;
            
            // Add heat distortion effect
            const distortion = Math.sin(time * 5) * 2;
            animatedName.style.transform = `scale(${1 + distortion * 0.01})`;
        }
        
        // Helper function to get random color
        function getRandomColor() {
            const colors = ['#6366f1', '#8b5cf6', '#ec4899', '#10b981', '#f59e0b', '#3b82f6'];
            return colors[Math.floor(Math.random() * colors.length)];
        }
        
        // Initialize the application
        window.addEventListener('DOMContentLoaded', init);
        window.addEventListener('resize', updateCanvasSize);
        
        // Start the application
        init();
    </script>
</body>
</html>
